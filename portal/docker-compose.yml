services:
  traefik:
    image: traefik:v3
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./dynamic:/etc/traefik/dynamic:ro

  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    restart: unless-stopped
    network_mode: host
    environment:
      - HOMEPAGE_ALLOWED_HOSTS=*
    volumes:
      - ./homepage:/app/config
